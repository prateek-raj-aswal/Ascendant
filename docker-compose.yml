version: "3.9"

services:
  postgres:
    image: postgres:16.3-alpine
    container_name: ascendant-postgres
    restart: unless-stopped
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ascendant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ascendant_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ascendant}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ascendant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.5-alpine
    container_name: ascendant-redis
    restart: unless-stopped
    user: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ascendant_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ascendant_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
